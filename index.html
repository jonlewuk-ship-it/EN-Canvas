<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B1120; color: #FFFFFF; }
        .canvas-card { background: #1E293B; border: 1px solid #334155; }
        .acca-yellow { color: #FFDD00; }
        textarea { color: #000; }
    </style>
</head>
<body class="p-8">
    <header class="mb-10 border-b border-slate-700 pb-6">
        <h1 class="text-4xl font-extrabold">ACCA <span class="acca-yellow">BIM Strategy Canvas</span></h1>
    </header>

    <div id="canvas-grid" class="grid grid-cols-5 grid-rows-2 gap-4 h-[750px]"></div>

    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-lg border border-slate-600">
            <h2 id="modal-title" class="text-xl font-bold mb-4 acca-yellow"></h2>
            <textarea id="entry-text" class="w-full h-40 p-4 rounded mb-4" placeholder="Describe your strategy here..."></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-400">Cancel</button>
                <button onclick="saveEntry()" class="px-6 py-2 bg-[#FFDD00] text-black font-bold rounded">Save Strategy</button>
            </div>
        </div>
    </div>

    <script>
        const sections = [
            { name: "Partner Chiave", tip: "Strategic alliances, BIM-GIS partners, suppliers." },
            { name: "Attività Chiave", tip: "R&D, standard evolution, marketing." },
            { name: "Proposte di Valore", tip: "Zero-loss interoperability, native BIM-GIS." },
            { name: "Relazioni con i Clienti", tip: "Automated nurturing, dedicated support." },
            { name: "Segmenti di Clientela", tip: "Smart Cities, Contractors, Public Admin." },
            { name: "Risorse Chiave", tip: "Proprietary web tech, human capital." },
            { name: "Canali", tip: "Marketplace, cloud self-service." },
            { name: "Struttura dei Costi", tip: "Hosting, R&D, international sales." },
            { name: "Flussi di Ricavi", tip: "SaaS, enterprise licensing, premium storage." }
        ];

        const grid = document.getElementById('canvas-grid');
        sections.forEach(sec => {
            grid.innerHTML += `
                <div class="canvas-card p-5 rounded-2xl flex flex-col" title="${sec.tip}">
                    <h2 class="text-[10px] uppercase font-bold text-slate-400 mb-4 cursor-help">${sec.name} ⓘ</h2>
                    <div id="content-${sec.name.replace(/ /g, '-')}" class="flex-grow overflow-y-auto space-y-2 text-sm text-white"></div>
                    <button onclick="openModal('${sec.name}')" class="mt-2 w-full py-2 bg-slate-700 hover:bg-slate-600 rounded text-[10px] font-bold">+ ADD ENTRY</button>
                </div>
            `;
        });

        async function loadData() {
            const res = await fetch('/api/canvas');
            const data = await res.json();
            data.forEach(entry => {
                const id = `content-${entry.section.replace(/ /g, '-')}`;
                const div = document.getElementById(id);
                if (div) div.innerHTML += `<div class="p-2 bg-slate-900 rounded border-l-2 border-[#FFDD00] mb-2">${entry.content}</div>`;
            });
        }

        let activeSection = "";
        function openModal(sec) { activeSection = sec; document.getElementById('modal-title').innerText = sec; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        async function saveEntry() {
            const content = document.getElementById('entry-text').value;
            await fetch('/api/canvas', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ section: activeSection, content }) });
            location.reload();
        }
        loadData();
    </script>
</body>
</html>
