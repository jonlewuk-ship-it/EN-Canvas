<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a14; color: #FFFFFF; font-family: 'Inter', sans-serif; }
        #canvas-grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 1fr); gap: 12px; height: 750px; }
        .bmc-box { background: #0f172a; border: 1px solid #1e293b; padding: 12px; display: flex; flex-direction: column; overflow: hidden; }
        /* Semi-transparent scroller */
        .scroller { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255, 221, 0, 0.3) transparent; flex-grow: 1; }
        .scroller::-webkit-scrollbar { width: 6px; }
        .scroller::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        .acca-yellow { color: #FFDD00; }
        .entry-card { background: rgba(30, 41, 59, 0.7); border-left: 3px solid #FFDD00; padding: 8px; margin-bottom: 8px; font-size: 0.75rem; position: relative; }
    </style>
</head>
<body class="p-6">
    <header class="mb-6 border-b border-slate-800 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-extrabold">ACCA <span class="acca-yellow">BIM Strategy Canvas</span></h1>
            <p class="text-slate-400 text-sm">EN-TEAM | Global Market Intelligence Portal</p>
        </div>
    </header>

    <div id="canvas-grid">
        <div class="bmc-box" style="grid-area: 1 / 1 / 3 / 2;" data-section="Partner Chiave"></div>
        <div class="bmc-box" style="grid-area: 1 / 2 / 2 / 3;" data-section="Attività Chiave"></div>
        <div class="bmc-box" style="grid-area: 2 / 2 / 3 / 3;" data-section="Risorse Chiave"></div>
        <div class="bmc-box" style="grid-area: 1 / 3 / 3 / 4;" data-section="Proposte di Valore"></div>
        <div class="bmc-box" style="grid-area: 1 / 4 / 2 / 5;" data-section="Relazioni con i Clienti"></div>
        <div class="bmc-box" style="grid-area: 2 / 4 / 3 / 5;" data-section="Canali"></div>
        <div class="bmc-box" style="grid-area: 1 / 5 / 3 / 6;" data-section="Segmenti di Clientela"></div>
        <div class="bmc-box" style="grid-area: 3 / 1 / 4 / 3;" data-section="Struttura dei Costi"></div>
        <div class="bmc-box" style="grid-area: 3 / 3 / 4 / 6;" data-section="Flussi di Ricavi"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-[#0f172a] p-8 rounded-2xl w-full max-w-xl border border-slate-700">
            <h2 id="modal-title" class="text-xl font-bold mb-4 acca-yellow"></h2>
            <textarea id="entry-text" class="w-full h-32 p-4 bg-slate-950 rounded border border-slate-700 text-white"></textarea>
            <div id="modal-guidance" class="mt-4"></div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeModal()" class="text-slate-400">Annulla</button>
                <button id="save-btn" class="px-6 py-2 bg-[#FFDD00] text-black font-bold rounded">Salva Strategia</button>
            </div>
        </div>
    </div>

    <script>
        let currentEditId = null;
        const guidance = {
            "Partner Chiave": "Esempio: Esri, buildingSMART, system integrator locali.",
            "Attività Chiave": "Esempio: Sviluppo plugin usBIM,...",
            "Risorse Chiave": "Esempio: Motore browser proprietario, capitale umano BIM.",
            "Proposte di Valore": "Esempio: Interoperabilità a Zero Perdita dati (IFC), Digital Twins.",
            "Relazioni con i Clienti": "Esempio: Nurturing automatizzato, customer success dedicato.",
            "Canali": "Esempio: Marketplace globale, inbound freemium, webinar.",
            "Segmenti di Clientela": "Esempio: PA, Smart Cities, General Contractor.",
            "Struttura dei Costi": "Esempio: Hosting massivo, R&D, marketing internazionale.",
            "Flussi di Ricavi": "Esempio: SaaS pay-per-use, licenze Enterprise CDE."
        };

        document.querySelectorAll('.bmc-box').forEach(box => {
            const sec = box.getAttribute('data-section');
            box.innerHTML = `<h2 class="text-[9px] uppercase font-bold text-slate-500 mb-2">${sec}</h2>
                             <div id="content-${sec.replace(/ /g, '-')}" class="scroller"></div>
                             <button onclick="openModal('${sec}')" class="mt-2 text-[9px] bg-slate-800 py-1 rounded hover:bg-slate-700">+ AGGIUNGI</button>`;
        });

        async function loadData() {
            const res = await fetch('/api/canvas');
            const data = await res.json();
            document.querySelectorAll('.scroller').forEach(s => s.innerHTML = '');
            data.forEach(entry => {
                const container = document.getElementById(`content-${entry.section.replace(/ /g, '-')}`);
                if (container) {
                    container.innerHTML += `
                        <div class="entry-card">
                            ${entry.content}
                            <div class="flex gap-2 mt-2 justify-end">
                                <button onclick="editEntry(${entry.id}, '${entry.content.replace(/'/g, "\\'")}', '${entry.section}')" class="text-blue-400 text-[10px]">✎ Edit</button>
                                <button onclick="deleteEntry(${entry.id})" class="text-red-400 text-[10px]">✕ Delete</button>
                            </div>
                        </div>`;
                }
            });
        }

        function openModal(sec, id = null, content = '') {
            currentEditId = id;
            document.getElementById('modal-title').innerText = sec;
            document.getElementById('entry-text').value = content;
            document.getElementById('modal-guidance').innerHTML = `<p class="text-[10px] text-[#FFDD00] uppercase font-bold">Guida:</p><p class="text-xs text-slate-300 italic">${guidance[sec]}</p>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveEntry() {
            const content = document.getElementById('entry-text').value;
            const section = document.getElementById('modal-title').innerText;
            await fetch('/api/canvas', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ section, content, id: currentEditId }) });
            closeModal();
            loadData();
        }

        async function deleteEntry(id) {
            if(confirm('Eliminare questa voce?')) {
                await fetch('/api/canvas', { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id }) });
                loadData();
            }
        }

        function editEntry(id, content, section) { openModal(section, id, content); }
        document.getElementById('save-btn').onclick = saveEntry;
        loadData();
    </script>
</body>
</html>
