<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#F8F9FA] p-8">
    <h1 class="text-2xl font-bold mb-8">usBIM Strategy Canvas | EN TEAM</h1>
    <div id="canvas-grid" class="grid grid-cols-3 gap-6"></div>

    <script>
        // Draw the grid first, then try to connect to the DB
        const sections = ["Key Partners", "Key Activities", "Key Resources", "Value Proposition", "Client Relationship", "Communication Channels", "Client Segments", "Structural Costs", "Revenue Streams"];
        const grid = document.getElementById('canvas-grid');
        
        sections.forEach(sec => {
            grid.innerHTML += `
                <div class="bg-white border p-4 rounded shadow-sm">
                    <h2 class="font-bold text-sm uppercase text-gray-700 mb-4 border-b pb-2">${sec}</h2>
                    <div id="content-${sec.replace(/ /g, '-')}" class="min-h-[100px]"></div>
                </div>
            `;
        });

        console.log("Grid rendered. Now attempting Supabase connection...");
    </script>
</body>
</html>
