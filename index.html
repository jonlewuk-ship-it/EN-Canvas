<script>
        // REPLACE THESE STRINGS WITH YOUR ACTUAL SUPABASE CREDENTIALS
        const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const sections = [
            "Key Partners", "Key Activities", "Key Resources", 
            "Value Proposition", "Client Relationship", "Communication Channels", 
            "Client Segments", "Structural Costs", "Revenue Streams"
        ];

        const grid = document.getElementById('canvas-grid');
        sections.forEach(sec => {
            const sectionId = sec.replace(/ /g, '-');
            grid.innerHTML += `
                <div class="bg-white border border-gray-200 p-4 rounded shadow-sm">
                    <h2 class="font-bold text-sm uppercase text-gray-700 mb-4 border-b pb-2">${sec}</h2>
                    <div id="content-${sectionId}" class="min-h-[100px] mb-4 space-y-2"></div>
                    <button onclick="alert('Functionality coming soon: Add record to ${sec}')" class="w-full bg-[#FFDD00] text-black font-bold py-2 rounded text-xs hover:bg-yellow-400">
                        + Add Record
                    </button>
                </div>
            `;
        });

        // Load data from Supabase
        async function loadData() {
            const { data, error } = await supabase.from('canvas_entries').select('*');
            if (error) {
                console.error("Error loading data:", error);
                return;
            }
            data.forEach(entry => {
                const sectionDiv = document.getElementById(`content-${entry.section.replace(/ /g, '-')}`);
                if (sectionDiv) {
                    sectionDiv.innerHTML += `<div class="p-2 bg-gray-50 border rounded text-xs">${entry.content}</div>`;
                }
            });
        }

        loadData();
    </script>
