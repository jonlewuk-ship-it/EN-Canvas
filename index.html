<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B1120; color: #E2E8F0; }
        .canvas-card { background: #1E293B; border: 1px solid #334155; }
        .acca-yellow { color: #FFDD00; }
        .btn-acca { background-color: #FFDD00; color: #000; font-weight: 800; }
    </style>
</head>
<body class="p-8">
    <header class="mb-10 border-b border-slate-700 pb-6 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tighter">ACCA <span class="acca-yellow">BIM Strategy Canvas</span></h1>
            <p class="text-slate-400 mt-2">Digital Transformation & OpenBIM Global Market Intelligence</p>
        </div>
    </header>

    <div id="canvas-grid" class="grid grid-cols-5 grid-rows-2 gap-4 h-[750px]"></div>

    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-[#1E293B] p-6 rounded-xl w-full max-w-lg border border-slate-600">
            <h2 id="modal-title" class="text-xl font-bold mb-4 acca-yellow">Add Strategy Detail</h2>
            <textarea id="entry-text" class="w-full h-40 bg-slate-900 text-white p-4 rounded mb-4" placeholder="Enter detailed strategy..."></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-400">Cancel</button>
                <button onclick="saveEntry()" class="px-6 py-2 btn-acca rounded">Save Strategy</button>
            </div>
        </div>
    </div>

    <script>
        const layout = [
            { name: "Partner Chiave", col: "span 1", row: "span 2" },
            { name: "Attività Chiave", col: "span 1", row: "span 1" },
            { name: "Proposte di Valore", col: "span 1", row: "span 2" },
            { name: "Relazioni con i Clienti", col: "span 1", row: "span 1" },
            { name: "Segmenti di Clientela", col: "span 1", row: "span 2" },
            { name: "Risorse Chiave", col: "span 1", row: "span 1" },
            { name: "Canali", col: "span 1", row: "span 1" },
            { name: "Struttura dei Costi", col: "span 2", row: "span 1" },
            { name: "Flussi di Ricavi", col: "span 3", row: "span 1" }
        ];

        let activeSection = "";
        const grid = document.getElementById('canvas-grid');
        
        layout.forEach(sec => {
            grid.innerHTML += `
                <div class="canvas-card p-5 rounded-2xl flex flex-col" style="grid-column: ${sec.col}; grid-row: ${sec.row};">
                    <h2 class="text-[10px] uppercase font-bold text-slate-500 tracking-[0.2em] mb-4">${sec.name}</h2>
                    <div id="content-${sec.name.replace(/ /g, '-')}" class="flex-grow overflow-y-auto space-y-3 mb-4 text-sm text-slate-300"></div>
                    <button onclick="openModal('${sec.name}')" class="w-full py-2 bg-slate-700 hover:bg-slate-600 rounded text-[10px] font-bold tracking-widest">+ ADD ENTRY</button>
                </div>
            `;
        });

        function openModal(sec) { activeSection = sec; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        async function saveEntry() {
            const content = document.getElementById('entry-text').value;
            await fetch('/api/canvas', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ section: activeSection, content })
            });
            location.reload();
        }
    </script>
</body>
</html>
