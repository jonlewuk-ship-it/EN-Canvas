<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .acca-yellow { background-color: #FFDD00; }
        .canvas-box { border: 2px solid #e5e7eb; transition: all 0.2s; }
        .canvas-box:hover { border-color: #FFDD00; }
    </style>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-black p-6 rounded-lg">
            <h1 class="text-white text-3xl font-bold">usBIM <span class="text-[#FFDD00]">Strategy Canvas</span></h1>
            <div class="h-10 w-32 bg-[#FFDD00] rounded-sm"></div> </header>

        <div id="canvas-grid" class="grid grid-cols-5 grid-rows-2 gap-4 h-[700px]">
            </div>
    </div>

    <script>
        const layout = [
            { name: "Partner Chiave", col: "span 1", row: "span 2" },
            { name: "Attività Chiave", col: "span 1", row: "span 1" },
            { name: "Proposte di Valore", col: "span 1", row: "span 2" },
            { name: "Relazioni con i Clienti", col: "span 1", row: "span 1" },
            { name: "Segmenti di Clientela", col: "span 1", row: "span 2" },
            { name: "Risorse Chiave", col: "span 1", row: "span 1" },
            { name: "Canali", col: "span 1", row: "span 1" },
            { name: "Struttura dei Costi", col: "span 2", row: "span 1" },
            { name: "Flussi di Ricavi", col: "span 3", row: "span 1" }
        ];

        const grid = document.getElementById('canvas-grid');
        layout.forEach(sec => {
            grid.innerHTML += `
                <div class="canvas-box bg-white p-4 rounded-xl flex flex-col" style="grid-column: ${sec.col}; grid-row: ${sec.row};">
                    <h2 class="font-black text-xs uppercase tracking-widest text-gray-400 mb-3">${sec.name}</h2>
                    <div id="content-${sec.name.replace(/ /g, '-')}" class="flex-grow overflow-y-auto space-y-3 mb-4"></div>
                    <button onclick="addEntry('${sec.name}')" class="text-xs font-bold py-2 bg-gray-100 hover:bg-[#FFDD00] rounded transition-colors">+ ADD ENTRY</button>
                </div>
            `;
        });
    </script>
</body>
</html>
